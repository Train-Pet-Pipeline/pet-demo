name: ci-core

on:
  pull_request:
    paths:
      - "core/**"
      - "offline_bake/**"
      - ".github/workflows/ci-core.yml"
  push:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: System deps (opencv + ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 ffmpeg

      - name: Install core[dev,detector,tracker,reid,narrative]
        working-directory: core
        # Pose intentionally excluded: mmcv build chain is heavy; mmpose tests skip via importorskip.
        run: |
          pip install -e ".[dev,detector,tracker,reid,narrative]"

      - name: Install offline_bake
        run: pip install -e offline_bake/

      - name: Ruff check
        working-directory: core
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Mypy (core)
        working-directory: core
        run: mypy src/purrai_core

      - name: Pytest (core, non-GPU)
        working-directory: core
        run: pytest tests/ -v

      - name: Pytest (offline_bake)
        working-directory: offline_bake
        run: pytest tests/ -v
